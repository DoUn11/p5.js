<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Creative Coding Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0d10;
      --panel: #11151b;
      --line: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --accent: #5da9ff;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(93,169,255,0.12), transparent 30%),
        linear-gradient(to bottom, #0b0d10, #07090c);

      color: var(--text);

      font-family:
        "Inter",
        "Pretendard",
        "Noto Sans KR",
        sans-serif;

      min-height: 100vh;

      display: flex;
      flex-direction: column;
      align-items: center;

      padding:
        80px
        40px
        120px;
    }

    .hero {
      width: 100%;
      max-width: 1280px;

      margin-bottom: 72px;

      border-bottom: 1px solid var(--line);
      padding-bottom: 28px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    #projects {
      width: 100%;
      max-width: 1280px;

      display: grid;
      grid-template-columns: repeat(2, 600px);
      justify-content: center;

      gap: 40px;
    }

    .cell {
      width: 600px;
      height: 400px;

      position: relative;
      overflow: hidden;

      background: var(--panel);

      border: 1px solid var(--line);
      border-radius: 20px;

      transition:
        transform 0.35s ease,
        border-color 0.35s ease,
        box-shadow 0.35s ease;
    }

    .cell:hover {
      transform: translateY(-6px);

      border-color: rgba(93,169,255,0.4);

      box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        0 0 30px rgba(93,169,255,0.12);
    }

    .project-wrap { 
        display: flex; 
        flex-direction: column; 
        gap: 14px; 
    } 
    
    .project-text { 
        font-size: 0.95rem; 
        font-weight: 600; 
        letter-spacing: -0.02em; 
        color: rgba(255,255,255,0.88); 
        padding-left: 4px; 
    }

    iframe {
      width: 600px;
      height: 400px;
      border: none;

      background: #000;
    }

    @media (max-width: 1280px) {
      #projects {
        grid-template-columns: 1fr;
      }

      .cell {
        width: 100%;
        max-width: 600px;
      }

      iframe {
        width: 100%;
      }
    }

    @media (max-width: 680px) {
      body {
        padding: 40px 20px 80px;
      }

      .cell {
        height: auto;
        aspect-ratio: 3 / 2;
      }

      iframe {
        height: 100%;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <h1>
      p5.js<br />
      Visual Archive
    </h1>

  </section>

    <main id="projects">

    <div class="project-wrap">

        <div class="project-text">
        Silent Galaxy
        </div>

        <div class="cell">
        <iframe src="sample1/index.html"></iframe>
        </div>

    </div>

    <div class="project-wrap">

        <div class="project-text">
        Kinetic Galaxy
        </div>

        <div class="cell">
        <iframe src="sample4/index.html"></iframe>
        </div>

    </div>

    <div class="project-wrap">

        <div class="project-text">
        Visual Self-Portrait
        </div>

        <div class="cell">
        <iframe src="sample2/index.html"></iframe>
        </div>

    </div>

    <div class="project-wrap">

        <div class="project-text">
        Responsive Self-Portrait
        </div>

        <div class="cell">
        <iframe src="sample3/index.html"></iframe>
        </div>

    </div>

    </main>

</body>
</html>
